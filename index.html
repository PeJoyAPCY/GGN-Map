<!DOCTYPE html>
<html lang="th">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        GGN Operations Map

    </title>

    <link
        rel="stylesheet"
        href="css/style.css">

</head>

<body>

    <!-- =====================================
         HEADER
    ====================================== -->

    <header>

        <div class="logo">

            <img
                src="images/logo.png"
                alt="GGN Logo">

            <div>

                <h2>

                    GGN Operations Map

                </h2>

                <p>

                    บริษัท รักษาความปลอดภัย
                    เกรท การ์เดียน นอร์ทเทอร์น จำกัด

                </p>

            </div>

        </div>

    </header>

    <!-- =====================================
         MAIN
    ====================================== -->

    <div class="container">

        <!-- =================================
             SIDEBAR
        ================================== -->

        <aside class="sidebar">

            <h2>

                ค้นหาพื้นที่

            </h2>

            <label for="province">

                จังหวัด

            </label>

            <select id="province">

            </select>

            <label for="zone">

                โซน

            </label>

            <select id="zone">

            </select>

            <hr>

            <!-- =============================
                 SEARCH
            ============================== -->

            <h2>

                ค้นหาหน่วยงาน

            </h2>

            <div class="search-box">

                <input

                    type="text"

                    id="searchInput"

                    placeholder="เช่น เคียวเซร่า หรือ เบอร์นิน่า"

                    autocomplete="off"

                    spellcheck="false">

                <button

                    id="searchBtn"

                    type="button">

                    🔍 ค้นหา

                </button>

                <button

                    id="clearSearch"

                    type="button">

                    ❌ ล้าง

                </button>

            </div>

            <!-- =============================
                 SEARCH RESULT
            ============================== -->

            <div

                id="searchResult"

                class="search-result">

                <p class="empty">

                    พิมพ์ชื่อหน่วยงานเพื่อค้นหา

                </p>

            </div>

            <hr>
            <!-- =============================
                 DASHBOARD
            ============================== -->

            <div class="dashboard">

                <h3>

                    จำนวนหน่วยงาน

                </h3>

                <div

                    id="totalUnit"

                    class="total">

                    0

                </div>

            </div>

            <!-- =============================
                 OPEN MAP
            ============================== -->

            <button

                id="openMap"

                type="button">

                เปิด Google My Maps

            </button>

            <!-- =============================
                 LOADING
            ============================== -->

            <div

                id="loading"

                style="display:none;text-align:center;padding:12px;">

                กำลังโหลดข้อมูล...

            </div>

        </aside>

        <!-- =================================
             CONTENT
        ================================== -->

        <main class="content">

            <!-- =================================
                 Floating Popup
            ================================== -->

            <div

                id="mapPopup"

                class="map-popup">

                <div class="popup-header">

                    <div
                        id="popupTitle"
                        class="popup-title">

                        รายละเอียดหน่วยงาน

                    </div>

                    <button

                        id="popupClose"

                        class="popup-close"

                        type="button">

                        ✕

                    </button>

                </div>

                <div

                    id="popupContent"

                    class="popup-content">

                    <div class="popup-empty">

                        📍 เลือกหน่วยงานจากผลการค้นหา

                    </div>

                </div>

            </div>

            <!-- =================================
                 Google My Maps
            ================================== -->

            <iframe

                id="mapFrame"

                title="GGN Operations Map"

                loading="lazy"

                allowfullscreen>

            </iframe>

        </main>

    </div>
    <!-- =====================================
         SCRIPT
    ====================================== -->

    <script src="js/maps.js"></script>

    <script src="js/script.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
