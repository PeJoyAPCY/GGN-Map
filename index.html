<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GGN Operations Map</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<div class="logo">

<img src="images/logo.png" alt="GGN Logo">

<div>

<h2>GGN Operations Map</h2>

<p>บริษัท รักษาความปลอดภัย เกรท การ์เดียน นอร์ทเทอร์น จำกัด</p>

</div>

</div>

</header>

<div class="container">

<!-- Sidebar -->
<div class="sidebar">

<h2>ค้นหาพื้นที่</h2>

<label for="province">จังหวัด</label>

<select id="province"></select>

<label for="zone">โซน</label>

<select id="zone"></select>

<hr>

<h2>ค้นหาหน่วยงาน</h2>

<input
type="text"
id="searchInput"
placeholder="เช่น เคียวเซร่า หรือ เบอร์นิน่า"
autocomplete="off"
spellcheck="false">

<div id="searchResult" class="search-result">

<p class="empty">
พิมพ์ชื่อหน่วยงานเพื่อค้นหา
</p>

</div>

<button
id="clearSearch"
type="button">

ล้างการค้นหา

</button>

<hr>

<div class="dashboard">

<h3>จำนวนหน่วยงาน</h3>

<div id="totalUnit" class="total">
0
</div>

</div>

<button
id="openMap"
type="button">

เปิด Google My Maps

</button>

<div
id="loading"
style="display:none;text-align:center;padding:12px;">

กำลังโหลดข้อมูล...

</div>

</div>

<!-- Map -->

<div class="content">

<iframe
id="mapFrame"
title="GGN Operations Map"
loading="lazy"
allowfullscreen>
</iframe>

</div>

</div>

<script src="js/maps.js"></script>
<script src="js/script.js"></script>
<script src="js/app.js"></script>

<script>

// ปุ่มล้างข้อความค้นหา

const clearButton = document.getElementById("clearSearch");

clearButton.addEventListener("click",function(){

    const input=document.getElementById("searchInput");

    const result=document.getElementById("searchResult");

    input.value="";

    result.innerHTML='<p class="empty">พิมพ์ชื่อหน่วยงานเพื่อค้นหา</p>';

    result.style.display="none";

    input.focus();

});

</script>

</body>

</html>
