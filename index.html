<!DOCTYPE html>
<html lang="th">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        GGN Operations Map

    </title>

    <link
        rel="stylesheet"
        href="css/style.css">

</head>

<body>

    <!-- =====================================
         HEADER
    ====================================== -->

    <header>

        <div class="header-left">

            <!-- Mobile Menu -->

            <button

                id="menuToggle"

                class="menu-toggle"

                type="button"

                aria-label="เปิดเมนู">

                ☰

            </button>

            <div class="logo">

                <img

                    src="images/logo.png"

                    alt="GGN Logo">

                <div>

                    <h2>

                        GGN Operations Map

                    </h2>

                    <p>

                        บริษัท รักษาความปลอดภัย
                        เกรท การ์เดียน นอร์ทเทอร์น จำกัด

                    </p>

                </div>

            </div>

        </div>

    </header>

    <!-- ===============================
         Overlay (Mobile)
    ================================ -->

    <div

        id="sidebarOverlay"

        class="sidebar-overlay">

    </div>

    <!-- =====================================
         MAIN
    ====================================== -->

    <div class="container">

        <!-- =================================
             SIDEBAR
        ================================== -->

        <aside

            id="sidebar"

            class="sidebar">
            <!-- =================================
                 Mobile Sidebar Header
            ================================== -->

            <div class="sidebar-mobile-header">

                <h2>

                    เมนูค้นหา

                </h2>

                <button

                    id="closeSidebar"

                    class="close-sidebar"

                    type="button"

                    aria-label="ปิดเมนู">

                    ✕

                </button>

            </div>

            <!-- =================================
                 จังหวัด / โซน
            ================================== -->

            <h2>

                ค้นหาพื้นที่

            </h2>

            <label for="province">

                จังหวัด

            </label>

            <select id="province">

            </select>

            <label for="zone">

                โซน

            </label>

            <select id="zone">

            </select>

            <hr>

            <!-- =================================
                 Search
            ================================== -->

            <h2>

                ค้นหาหน่วยงาน

            </h2>

            <div class="search-box">

                <input

                    type="text"

                    id="searchInput"

                    placeholder="เช่น เคียวเซร่า หรือ เบอร์นิน่า"

                    autocomplete="off"

                    spellcheck="false">

                <button

                    id="clearSearch"

                    type="button">

                    ❌ ล้าง

                </button>

            </div>

            <!-- =================================
                 Search Result
            ================================== -->

            <div

                id="searchResult"

                class="search-result">

                <p class="empty">

                    พิมพ์ชื่อหน่วยงานเพื่อค้นหา

                </p>

            </div>

            <hr>

            <!-- =================================
                 Dashboard
            ================================== -->

            <div class="dashboard">

                <h3>

                    จำนวนหน่วยงาน

                </h3>

                <div

                    id="totalUnit"

                    class="total">

                    0

                </div>

            </div>

            <!-- =================================
                 Loading
            ================================== -->

            <div

                id="loading"

                style="display:none;text-align:center;padding:12px;">

                กำลังโหลดข้อมูล...

            </div>

        </aside>

        <!-- =================================
             CONTENT
        ================================== -->

        <main class="content">
            <iframe

                id="mapFrame"

                title="GGN Operations Map"

                loading="lazy"

                allowfullscreen>

            </iframe>

        </main>

    </div>

    <!-- =====================================
         Floating Popup
    ====================================== -->

    <div id="mapPopup" class="map-popup">

    <div
        id="popupHeader"
        class="popup-header">

        <h3 id="popupTitle">

            รายละเอียดหน่วยงาน

        </h3>

        <span
            id="popupArrow"
            class="popup-arrow">

            ▼

        </span>

    </div>

        <div

            id="popupContent"

            class="popup-content">

            กรุณาเลือกหน่วยงาน

        </div>

    </div>

</main>

    <!-- =====================================
         JavaScript
    ====================================== -->

    <script src="js/maps.js"></script>

    <script src="js/navigation.js"></script>

    <script src="js/popup.js"></script>

    <script src="js/search.js"></script>

    <script src="js/kml.js"></script>

    <script src="js/script.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
